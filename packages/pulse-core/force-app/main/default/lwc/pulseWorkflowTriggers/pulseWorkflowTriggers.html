<template>
    <div class="triggers-shell">
        <div class="triggers-header">
            <div>
                <h3 class="triggers-heading">Auto-start triggers</h3>
                <p class="triggers-desc">
                    Start a workflow instance automatically when a record matches these conditions.
                    An Apex trigger on the target object is provisioned on first save.
                </p>
            </div>
            <c-pulse-button label="Add trigger" variant="primary" size="sm"
                            onclick={handleAddTrigger}>
            </c-pulse-button>
        </div>

        <template lwc:if={loading}>
            <div class="triggers-loading">Loading…</div>
        </template>

        <template lwc:if={listError}>
            <div class="triggers-error-banner">{listError}</div>
        </template>

        <template lwc:if={hasTriggers}>
            <ul class="triggers-list">
                <template for:each={decoratedTriggers} for:item="t">
                    <li key={t.rowId} class="trigger-card">
                        <div class="trigger-card-grid">
                            <label class="trigger-field">
                                <span class="trigger-field-label">Target object</span>
                                <c-pulse-input value={t.targetObject}
                                               placeholder="Opportunity"
                                               data-row-id={t.rowId}
                                               onchange={handleTargetObjectChange}>
                                </c-pulse-input>
                            </label>

                            <label class="trigger-field">
                                <span class="trigger-field-label">Fires on</span>
                                <select class="trigger-select"
                                        data-row-id={t.rowId}
                                        onchange={handleEventTypeChange}>
                                    <template for:each={t.eventTypeOptions} for:item="opt">
                                        <option key={opt.value}
                                                value={opt.value}
                                                selected={opt.selected}>
                                            {opt.label}
                                        </option>
                                    </template>
                                </select>
                            </label>

                            <label class="trigger-field">
                                <span class="trigger-field-label">Start at state</span>
                                <select class="trigger-select"
                                        data-row-id={t.rowId}
                                        onchange={handleInitialStateChange}>
                                    <template for:each={t.stateOptions} for:item="opt">
                                        <option key={opt.value}
                                                value={opt.value}
                                                selected={opt.selected}>
                                            {opt.label}
                                        </option>
                                    </template>
                                </select>
                            </label>

                            <div class="trigger-active-wrap">
                                <c-pulse-toggle label="Active"
                                                checked={t.active}
                                                data-row-id={t.rowId}
                                                onchange={handleActiveToggle}>
                                </c-pulse-toggle>
                            </div>
                        </div>

                        <div class="trigger-conditions">
                            <c-pulse-condition-builder
                                condition-tree={t.conditionTree}
                                target-object={t.targetObject}
                                logic-label="Start when"
                                data-row-id={t.rowId}
                                onchange={handleConditionChange}>
                            </c-pulse-condition-builder>
                        </div>

                        <template lwc:if={t.apexTriggerStatus}>
                            <div class="trigger-status-hint">{t.apexTriggerStatus}</div>
                        </template>

                        <template lwc:if={t.warning}>
                            <div class="trigger-warning-banner">{t.warning}</div>
                        </template>

                        <template lwc:if={t.error}>
                            <div class="trigger-error-banner">{t.error}</div>
                        </template>

                        <div class="trigger-actions">
                            <c-pulse-button label={t.saveLabel} variant="primary" size="sm"
                                            disabled={t.saveDisabled}
                                            data-row-id={t.rowId}
                                            onclick={handleSave}>
                            </c-pulse-button>
                            <c-pulse-button label="Delete" variant="ghost" size="sm"
                                            data-row-id={t.rowId}
                                            onclick={handleDelete}>
                            </c-pulse-button>
                        </div>
                    </li>
                </template>
            </ul>
        </template>
        <template lwc:else>
            <template lwc:if={loading}></template>
            <template lwc:else>
                <div class="triggers-empty">
                    No triggers yet. Click <strong>Add trigger</strong> to configure when this workflow starts.
                </div>
            </template>
        </template>
    </div>
</template>
