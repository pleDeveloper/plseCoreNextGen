<template>
    <div class="settings-panel">
        <template lwc:if={isLoading}>
            <p class="panel-loading">Loading settings…</p>
        </template>
        <template lwc:elseif={hasError}>
            <c-pulse-card>
                <p class="panel-error">{error}</p>
            </c-pulse-card>
        </template>
        <template lwc:else>
            <!-- Setup Status -->
            <c-pulse-card>
                <div class="section-header">
                    <h3 class="section-title">Setup status</h3>
                    <c-pulse-badge label={setupSummary} variant={setupSummaryVariant}></c-pulse-badge>
                </div>
                <p class="section-subtitle">
                    Prerequisites Pulse needs to work end-to-end. Click any row for setup instructions.
                </p>
                <ul class="setup-check-list">
                    <template for:each={setupCheckRows} for:item="c">
                        <li key={c.key} class={c.rowClass}>
                            <button class="setup-check-button"
                                    data-key={c.key}
                                    onclick={handleToggleCheck}>
                                <div class="setup-check-main">
                                    <span class="setup-check-label">{c.label}</span>
                                    <span class="setup-check-description">{c.description}</span>
                                    <template lwc:if={c.details}>
                                        <span class="setup-check-details">{c.details}</span>
                                    </template>
                                </div>
                                <c-pulse-badge label={c.statusLabel} variant={c.statusVariant}></c-pulse-badge>
                            </button>
                            <template lwc:if={c.isExpanded}>
                                <div class="setup-check-expanded">
                                    <template lwc:if={c.fixInstructions}>
                                        <div class="setup-check-fix">
                                            <span class="setup-check-fix-label">How to fix</span>
                                            <p class="setup-check-fix-body">{c.fixInstructions}</p>
                                        </div>
                                    </template>
                                    <template lwc:if={c.hasSetupLink}>
                                        <a href={c.setupPath} target="_blank" rel="noopener"
                                           class="setup-link">Open in Setup →</a>
                                    </template>
                                </div>
                            </template>
                        </li>
                    </template>
                </ul>
            </c-pulse-card>

            <!-- Feature Flags -->
            <c-pulse-card>
                <div class="section-header">
                    <h3 class="section-title">Feature flags</h3>
                    <a href="/lightning/setup/CustomMetadata/home"
                       target="_blank" rel="noopener"
                       class="setup-link">Edit in Setup →</a>
                </div>
                <template lwc:if={hasFeatureFlags}>
                    <div class="item-list">
                        <template for:each={flagRows} for:item="ff">
                            <div key={ff.developerName} class="item-row">
                                <div class="item-primary">
                                    <span class="item-name">{ff.featureKey}</span>
                                    <template lwc:if={ff.description}>
                                        <span class="item-detail item-muted">{ff.description}</span>
                                    </template>
                                </div>
                                <div class="item-badges">
                                    <c-pulse-badge label={ff.enabledLabel} variant={ff.enabledVariant}></c-pulse-badge>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                <template lwc:else>
                    <p class="empty-state">No feature flags defined. Create feature flags in Setup to control Pulse capabilities.</p>
                </template>
            </c-pulse-card>

            <!-- Pulse Permission Sets -->
            <c-pulse-card>
                <div class="section-header">
                    <h3 class="section-title">Pulse permission sets</h3>
                    <a href="/lightning/setup/PermSets/home"
                       target="_blank" rel="noopener"
                       class="setup-link">Edit in Setup →</a>
                </div>
                <template lwc:if={hasPermissionSets}>
                    <div class="item-list">
                        <template for:each={psRows} for:item="ps">
                            <div key={ps.developerName} class="item-row">
                                <div class="item-primary">
                                    <span class="item-name">{ps.label}</span>
                                    <span class="item-detail">{ps.developerName}</span>
                                </div>
                                <div class="item-badges">
                                    <template lwc:if={ps.assignedLabel}>
                                        <c-pulse-badge label={ps.assignedLabel} variant="success"></c-pulse-badge>
                                    </template>
                                    <template lwc:else>
                                        <span class="item-muted-text">Not assigned</span>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                <template lwc:else>
                    <p class="empty-state">No Pulse permission sets found in this org.</p>
                </template>
            </c-pulse-card>

            <!-- Recent Deployments -->
            <c-pulse-card>
                <div class="section-header">
                    <h3 class="section-title">Recent deployments</h3>
                </div>
                <template lwc:if={hasDeployments}>
                    <div class="item-list">
                        <template for:each={deploymentRows} for:item="d">
                            <div key={d.deploymentRequestId} class="item-row">
                                <div class="item-primary">
                                    <span class="item-name">{d.targetObject}</span>
                                    <template lwc:if={d.completedLabel}>
                                        <span class="item-detail item-muted">{d.completedLabel}</span>
                                    </template>
                                    <template lwc:if={d.hasError}>
                                        <span class="item-detail item-error">{d.errorMessage}</span>
                                    </template>
                                </div>
                                <div class="item-badges">
                                    <c-pulse-badge label={d.status} variant={d.statusVariant}></c-pulse-badge>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                <template lwc:else>
                    <p class="empty-state">No deployment history. Schema deployments will appear here as they run.</p>
                </template>
            </c-pulse-card>
        </template>
    </div>
</template>
