<template>
    <!-- Loading state intentionally renders nothing — re-mounts (FlexiPage
         refreshes) would otherwise flash a "Loading…" placeholder. The
         decision card / thinking placeholder appears the instant data
         lands. -->
    <template lwc:if={showThinking}>
        <c-pulse-card elevated>
            <div class="decision-thinking">
                <div class="thinking-avatar">
                    <span class="thinking-sparkle">✦</span>
                    <span class="thinking-initial">{personaInitial}</span>
                </div>
                <div class="thinking-text-wrap">
                    <span class="thinking-text">{thinkingMessage}</span>
                    <span class="thinking-dots">
                        <span class="thinking-dot"></span>
                        <span class="thinking-dot"></span>
                        <span class="thinking-dot"></span>
                    </span>
                </div>
                <p class="thinking-subtext">
                    Drafting the next step — this usually takes a few seconds.
                </p>
            </div>
        </c-pulse-card>
    </template>

    <template lwc:elseif={hasDecisions}>
        <c-pulse-card elevated>
            <div class={slideClass}>
                <div class="decision-header">
                    <c-pulse-badge label={active.typeLabel} variant={active.typeVariant}></c-pulse-badge>
                    <span class="decision-counter">{queueCounter}</span>
                </div>

                <template lwc:if={error}>
                    <div class="decision-error">
                        <c-pulse-badge label={error} variant="error"></c-pulse-badge>
                        <c-pulse-button label="Dismiss" variant="ghost" size="sm" onclick={handleDismissError}></c-pulse-button>
                    </div>
                </template>

                <div class="decision-rationale">
                    <span class="decision-rationale-label">✦ Why I'm proposing this</span>
                    <p class="decision-rationale-text">{active.rationale}</p>
                </div>

                <!-- Preview area -->
                <template lwc:if={active.preview.isEmail}>
                    <div class="decision-preview decision-preview-email">
                        <div class="decision-row">
                            <span class="decision-row-label">To</span>
                            <span class="decision-row-value">{active.preview.to}</span>
                        </div>
                        <div class="decision-row">
                            <span class="decision-row-label">Subject</span>
                            <span class="decision-row-value decision-row-subject">{active.preview.subject}</span>
                        </div>
                        <div class="decision-email-body">{active.preview.body}</div>
                    </div>
                </template>

                <template lwc:elseif={active.preview.isRecord}>
                    <div class="decision-preview decision-preview-record">
                        <template lwc:if={active.preview.objectType}>
                            <div class="decision-row">
                                <span class="decision-row-label">Object</span>
                                <span class="decision-row-value">{active.preview.objectType}</span>
                            </div>
                        </template>
                        <template lwc:if={active.preview.hasRows}>
                            <ul class="decision-record-rows">
                                <template for:each={active.preview.rows} for:item="r">
                                    <li key={r.key} class="decision-record-row">
                                        <span class="decision-record-key">{r.key}</span>
                                        <span class="decision-record-value">{r.value}</span>
                                    </li>
                                </template>
                            </ul>
                        </template>
                    </div>
                </template>

                <template lwc:elseif={active.preview.isQuestion}>
                    <div class="decision-preview decision-preview-question">
                        <p class="decision-question-prompt">{active.preview.prompt}</p>
                        <template lwc:if={active.preview.fieldKey}>
                            <p class="decision-question-field">
                                Field: <code>{active.preview.fieldKey}</code>
                            </p>
                        </template>
                        <label class="decision-answer-label">
                            <span>Your answer</span>
                            <textarea class="decision-answer-input"
                                      rows="3"
                                      value={answerValue}
                                      onchange={handleAnswerChange}></textarea>
                        </label>
                        <div class="decision-actions">
                            <c-pulse-button label="Submit answer"
                                            variant="primary"
                                            size="sm"
                                            onclick={handleAnswerSubmit}></c-pulse-button>
                        </div>
                    </div>
                </template>

                <template lwc:elseif={active.preview.isAdvance}>
                    <div class="decision-preview">
                        <p>Advance via signal: <strong>{active.preview.signal}</strong></p>
                    </div>
                </template>

                <template lwc:elseif={active.preview.isTool}>
                    <div class="decision-preview decision-preview-record">
                        <div class="decision-row">
                            <span class="decision-row-label">Action</span>
                            <span class="decision-row-value">{active.preview.toolLabel}</span>
                        </div>
                        <ul class="decision-record-rows">
                            <template for:each={active.preview.rows} for:item="r">
                                <li key={r.key} class="decision-record-row">
                                    <span class="decision-record-key">{r.key}</span>
                                    <span class="decision-record-value">{r.value}</span>
                                </li>
                            </template>
                        </ul>
                    </div>
                </template>

                <template lwc:else>
                    <pre class="decision-preview-raw">{active.preview.raw}</pre>
                </template>

                <!-- Refine editor (§4.2) — email | record | tool | raw -->
                <template lwc:if={refining}>
                    <div class="decision-refine">
                        <template lwc:if={activeDraft.mode}>
                            <template lwc:if={activeDraft.email}>
                                <label class="decision-refine-field">
                                    <span>To</span>
                                    <c-pulse-input label="" value={activeDraft.email.to} onchange={handleRefineEmailTo}></c-pulse-input>
                                </label>
                                <label class="decision-refine-field">
                                    <span>Subject</span>
                                    <c-pulse-input label="" value={activeDraft.email.subject} onchange={handleRefineEmailSubject}></c-pulse-input>
                                </label>
                                <label class="decision-refine-field">
                                    <span>Body</span>
                                    <textarea class="decision-refine-textarea" rows="6"
                                              onchange={handleRefineEmailBody}>{activeDraft.email.body}</textarea>
                                </label>
                            </template>
                            <template lwc:elseif={activeDraft.tool}>
                                <ul class="decision-refine-tool-list">
                                    <template for:each={activeDraft.tool.fields} for:item="f" for:index="idx">
                                        <li key={f.key} class="decision-refine-tool-row">
                                            <div class="decision-refine-tool-head">
                                                <span class="decision-refine-tool-label">{f.label}</span>
                                                <button type="button" class="decision-refine-tool-remove"
                                                        data-index={idx}
                                                        title="Remove this field"
                                                        onclick={handleRefineToolRemove}>×</button>
                                            </div>
                                            <template lwc:if={f.isLongText}>
                                                <textarea class="decision-refine-textarea"
                                                          rows="3"
                                                          data-index={idx}
                                                          onchange={handleRefineToolField}>{f.value}</textarea>
                                            </template>
                                            <template lwc:elseif={f.isNumber}>
                                                <input type="number"
                                                       class="decision-refine-input"
                                                       data-index={idx}
                                                       value={f.value}
                                                       onchange={handleRefineToolField} />
                                            </template>
                                            <template lwc:elseif={f.isDate}>
                                                <input type="date"
                                                       class="decision-refine-input"
                                                       data-index={idx}
                                                       value={f.value}
                                                       onchange={handleRefineToolField} />
                                            </template>
                                            <template lwc:else>
                                                <input type="text"
                                                       class="decision-refine-input"
                                                       data-index={idx}
                                                       value={f.value}
                                                       onchange={handleRefineToolField} />
                                            </template>
                                        </li>
                                    </template>
                                </ul>
                                <button type="button"
                                        class="decision-refine-tool-add"
                                        onclick={handleRefineToolAdd}>+ Add field</button>
                            </template>
                            <template lwc:elseif={activeDraft.raw}>
                                <label class="decision-refine-field">
                                    <span>Raw JSON</span>
                                    <textarea class="decision-refine-textarea" rows="8"
                                              onchange={handleRefineRaw}>{activeDraft.raw}</textarea>
                                </label>
                            </template>
                        </template>
                        <div class="decision-actions">
                            <c-pulse-button label="Cancel" variant="ghost" size="sm" onclick={handleRefineCancel}></c-pulse-button>
                            <c-pulse-button label="Approve with edits" variant="primary" size="sm" onclick={handleApprove}></c-pulse-button>
                        </div>
                    </div>
                </template>

                <!-- Reject input -->
                <template lwc:if={rejecting}>
                    <div class="decision-reject">
                        <label class="decision-refine-field">
                            <span>Why reject?</span>
                            <textarea class="decision-refine-textarea" rows="3"
                                      value={rejectReason}
                                      onchange={handleRejectReason}></textarea>
                        </label>
                        <div class="decision-actions">
                            <c-pulse-button label="Cancel" variant="ghost" size="sm" onclick={handleDismissError}></c-pulse-button>
                            <c-pulse-button label="Submit reject" variant="primary" size="sm" onclick={handleRejectSubmit}></c-pulse-button>
                        </div>
                    </div>
                </template>

                <!-- Primary actions -->
                <template lwc:if={active.isPropose}>
                    <div class="decision-actions decision-actions-main">
                        <c-pulse-button label="Approve" variant="primary" size="md" onclick={handleApprove}></c-pulse-button>
                        <c-pulse-button label="Refine" variant="secondary" size="md" onclick={handleRefineOpen}></c-pulse-button>
                        <c-pulse-button label="Reject" variant="ghost" size="md" onclick={handleReject}></c-pulse-button>
                    </div>
                </template>

                <template lwc:elseif={active.isAdvance}>
                    <div class="decision-actions decision-actions-main">
                        <c-pulse-button label="Approve" variant="primary" size="md" onclick={handleApprove}></c-pulse-button>
                        <c-pulse-button label="Reject" variant="ghost" size="md" onclick={handleReject}></c-pulse-button>
                    </div>
                </template>
            </div>
        </c-pulse-card>
    </template>
</template>
