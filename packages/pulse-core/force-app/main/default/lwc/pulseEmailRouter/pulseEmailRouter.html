<template>
    <div class="router-shell">
        <header class="router-header">
            <div>
                <h2 class="router-title pulse-gradient-text">Email routing</h2>
                <p class="router-desc">
                    Match inbound emails to the right Opportunity. Configure declarative
                    routing rules and resolve unrouted emails without leaving Admin Studio.
                </p>
            </div>
        </header>

        <template lwc:if={toast}>
            <div class={toast.class}>
                <span>{toast.message}</span>
                <button class="router-toast-close" onclick={handleDismissToast} aria-label="Dismiss">
                    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </template>

        <!-- Unrouted emails panel -->
        <section class="router-panel">
            <div class="router-panel-head">
                <div>
                    <h3 class="router-panel-title">Unrouted emails</h3>
                    <p class="router-panel-sub">{unroutedCountLabel}</p>
                </div>
                <c-pulse-button label="Refresh" variant="ghost" size="sm"
                                onclick={handleRefreshEmails}>
                </c-pulse-button>
            </div>

            <template lwc:if={loadingEmails}>
                <div class="router-loading">Loading…</div>
            </template>

            <template lwc:if={emailsError}>
                <div class="router-error-banner">{emailsError}</div>
            </template>

            <template lwc:if={hasUnrouted}>
                <ul class="router-email-list">
                    <template for:each={unrouted} for:item="c">
                        <li key={c.conversationId} class="router-email-card">
                            <div class="router-email-meta">
                                <span class="router-email-from">{c.senderEmail}</span>
                                <span class="router-email-subject">{c.subject}</span>
                            </div>
                            <div class="router-email-snippet">{c.snippet}</div>
                            <div class="router-email-actions">
                                <c-pulse-input value={c.pickerValue}
                                               placeholder="Paste record Id (e.g. 006…)"
                                               data-conversation-id={c.conversationId}
                                               onchange={handlePickerChange}>
                                </c-pulse-input>
                                <c-pulse-button label="Route to existing"
                                                variant="secondary" size="sm"
                                                disabled={c.busy}
                                                data-conversation-id={c.conversationId}
                                                onclick={handleRouteToExisting}>
                                </c-pulse-button>
                                <c-pulse-button label="Create new Opportunity"
                                                variant="primary" size="sm"
                                                disabled={c.busy}
                                                data-conversation-id={c.conversationId}
                                                onclick={handleCreateOpportunity}>
                                </c-pulse-button>
                                <c-pulse-button label="Create rule from this"
                                                variant="ghost" size="sm"
                                                data-conversation-id={c.conversationId}
                                                onclick={handleCreateRule}>
                                </c-pulse-button>
                            </div>
                            <template lwc:if={c.error}>
                                <div class="router-email-error">{c.error}</div>
                            </template>
                        </li>
                    </template>
                </ul>
            </template>
            <template lwc:else>
                <template lwc:if={loadingEmails}></template>
                <template lwc:else>
                    <div class="router-empty">
                        No unrouted emails. Inbound emails that match a routing rule or
                        existing thread go straight to the right record.
                    </div>
                </template>
            </template>
        </section>

        <!-- Routing rules panel -->
        <section class="router-panel">
            <div class="router-panel-head">
                <div>
                    <h3 class="router-panel-title">Routing rules</h3>
                    <p class="router-panel-sub">
                        Create, edit, and deactivate inbound-email routing rules.
                    </p>
                </div>
                <div class="router-panel-actions">
                    <c-pulse-button label="Refresh" variant="ghost" size="sm"
                                    onclick={handleRefreshRules}>
                    </c-pulse-button>
                    <c-pulse-button label="Add rule" variant="primary" size="sm"
                                    data-testid="add-rule"
                                    onclick={handleAddRule}>
                    </c-pulse-button>
                </div>
            </div>

            <template lwc:if={loadingRules}>
                <div class="router-loading">Loading…</div>
            </template>

            <template lwc:if={rulesError}>
                <div class="router-error-banner">{rulesError}</div>
            </template>

            <template lwc:if={hasRules}>
                <ul class="router-rules-list">
                    <template for:each={rules} for:item="r">
                        <li key={r.developerName} class="router-rule-card">
                            <div class="router-rule-head">
                                <div class="router-rule-title-wrap">
                                    <span class="router-rule-title">{r.developerName}</span>
                                    <span class={r.statusClass}>{r.statusLabel}</span>
                                </div>
                                <div class="router-rule-actions">
                                    <c-pulse-button label="Edit" variant="ghost" size="sm"
                                                    data-developer-name={r.developerName}
                                                    data-testid="edit-rule"
                                                    onclick={handleEditRule}>
                                    </c-pulse-button>
                                    <c-pulse-button label="Delete" variant="ghost" size="sm"
                                                    data-developer-name={r.developerName}
                                                    data-testid="delete-rule"
                                                    onclick={handleDeleteRule}>
                                    </c-pulse-button>
                                </div>
                            </div>
                            <dl class="router-rule-grid">
                                <div class="router-rule-kv">
                                    <dt>Rule key</dt><dd>{r.ruleKey}</dd>
                                </div>
                                <div class="router-rule-kv">
                                    <dt>Priority</dt><dd>{r.priorityLabel}</dd>
                                </div>
                                <div class="router-rule-kv">
                                    <dt>Source</dt><dd>{r.sourceAdapter}</dd>
                                </div>
                                <div class="router-rule-kv">
                                    <dt>Match strategy</dt><dd>{r.matchStrategy}</dd>
                                </div>
                                <div class="router-rule-kv">
                                    <dt>Target object</dt><dd>{r.targetObject}</dd>
                                </div>
                                <div class="router-rule-kv">
                                    <dt>Starts workflow</dt><dd>{r.triggerWorkflowKey}</dd>
                                </div>
                            </dl>
                        </li>
                    </template>
                </ul>
            </template>
            <template lwc:else>
                <template lwc:if={loadingRules}></template>
                <template lwc:else>
                    <div class="router-empty">
                        No routing rules configured yet. Click "Add rule" to create one.
                    </div>
                </template>
            </template>
        </section>

        <!-- Editor modal -->
        <c-pulse-modal open={editorOpen}
                       size="lg"
                       title={editorTitle}
                       dismissible="true"
                       onclose={handleEditorClose}>
            <div class="router-form">
                <div class="router-form-grid">
                    <c-pulse-input label="Rule key"
                                   value={editorRuleKey}
                                   data-field="ruleKey"
                                   placeholder="e.g. email_from_acme_com"
                                   required="true"
                                   onchange={handleFieldChange}>
                    </c-pulse-input>
                    <c-pulse-input label="Priority"
                                   type="number"
                                   value={editorPriority}
                                   data-field="priority"
                                   placeholder="100"
                                   onchange={handleFieldChange}>
                    </c-pulse-input>
                    <c-pulse-input label="Source adapter"
                                   value={editorSourceAdapter}
                                   data-field="sourceAdapter"
                                   placeholder="inbound_email"
                                   onchange={handleFieldChange}>
                    </c-pulse-input>
                    <c-pulse-input label="Match strategy"
                                   value={editorMatchStrategy}
                                   data-field="matchStrategy"
                                   placeholder="EMAIL_SENDER_TO_CONTACT"
                                   required="true"
                                   onchange={handleFieldChange}>
                    </c-pulse-input>
                    <c-pulse-input label="Target object"
                                   value={editorTargetObject}
                                   data-field="targetObject"
                                   placeholder="Opportunity"
                                   required="true"
                                   onchange={handleFieldChange}>
                    </c-pulse-input>
                    <c-pulse-input label="Starts workflow key"
                                   value={editorTriggerWorkflowKey}
                                   data-field="triggerWorkflowKey"
                                   placeholder="real_estate_leasing_v1"
                                   onchange={handleFieldChange}>
                    </c-pulse-input>
                </div>
                <div class="router-form-field">
                    <label class="router-form-label" for="createDefaultsJson">
                        Create defaults (JSON object)
                    </label>
                    <textarea id="createDefaultsJson"
                              class="router-form-textarea"
                              data-field="createDefaultsJson"
                              rows="5"
                              placeholder="JSON object of field defaults (e.g. StageName, Name)"
                              oninput={handleFieldChange}>{editorCreateDefaultsJson}</textarea>
                    <p class="router-form-help">
                        JSON object of field defaults applied when creating a record via this rule.
                    </p>
                </div>
                <label class="router-form-checkbox">
                    <input type="checkbox"
                           checked={editorActive}
                           data-field="active"
                           onchange={handleFieldChange}/>
                    <span>Active</span>
                </label>

                <template lwc:if={editorError}>
                    <div class="router-error-banner">{editorError}</div>
                </template>

                <div class="router-form-actions">
                    <c-pulse-button label="Cancel" variant="ghost"
                                    disabled={editorBusy}
                                    onclick={handleEditorClose}>
                    </c-pulse-button>
                    <c-pulse-button label="Save rule" variant="primary"
                                    disabled={editorBusy}
                                    data-testid="save-rule"
                                    onclick={handleSaveRule}>
                    </c-pulse-button>
                </div>
            </div>
        </c-pulse-modal>

        <!-- Delete confirmation modal -->
        <c-pulse-modal open={confirmOpen}
                       size="sm"
                       title="Deactivate routing rule"
                       dismissible="true"
                       onclose={handleConfirmClose}>
            <div class="router-form">
                <p class="router-form-text">{confirmMessage}</p>
                <div class="router-form-actions">
                    <c-pulse-button label="Cancel" variant="ghost"
                                    disabled={confirmBusy}
                                    onclick={handleConfirmClose}>
                    </c-pulse-button>
                    <c-pulse-button label="Deactivate" variant="primary"
                                    disabled={confirmBusy}
                                    data-testid="confirm-delete"
                                    onclick={handleConfirmDelete}>
                    </c-pulse-button>
                </div>
            </div>
        </c-pulse-modal>
    </div>
</template>
