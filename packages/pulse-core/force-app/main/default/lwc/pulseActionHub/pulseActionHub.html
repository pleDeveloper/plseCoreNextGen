<template>
    <!-- Loading -->
    <template lwc:if={isLoading}>
        <c-pulse-card>
            <p class="hub-loading">Loading approvals…</p>
        </c-pulse-card>
    </template>

    <!-- Error -->
    <template lwc:elseif={hasError}>
        <c-pulse-card>
            <c-pulse-badge label={error} variant="error"></c-pulse-badge>
        </c-pulse-card>
    </template>

    <!-- Content -->
    <template lwc:else>
        <div class="hub-container">
            <div class="hub-heading-row">
                <h2 class="hub-heading">Approvals awaiting you</h2>
                <c-pulse-badge label={countLabel} variant="magenta"></c-pulse-badge>
            </div>

            <!-- Resolve error -->
            <template lwc:if={hasResolveError}>
                <div class="hub-resolve-error">
                    <c-pulse-badge label={resolveError} variant="error"></c-pulse-badge>
                    <c-pulse-button label="Dismiss" variant="ghost" size="sm"
                                    onclick={handleDismissResolveError}></c-pulse-button>
                </div>
            </template>

            <!-- Empty state -->
            <template lwc:if={noActions}>
                <c-pulse-card>
                    <p class="hub-empty">No pending approvals for this workflow.</p>
                </c-pulse-card>
            </template>

            <!-- Action cards -->
            <template lwc:if={hasActions}>
                <ul class="hub-action-list" role="list">
                    <template for:each={actionCards} for:item="action">
                        <li key={action.actionId} class="hub-action-item" role="listitem">
                            <c-pulse-card elevated>
                                <div class="hub-action-header">
                                    <span class="hub-tool-label">{action.toolLabel}</span>
                                    <c-pulse-badge label={action.hitlPolicy} variant="purple"></c-pulse-badge>
                                </div>

                                <!-- Email preview -->
                                <template lwc:if={action.preview.isEmail}>
                                    <div class="hub-email-preview">
                                        <div class="hub-email-row">
                                            <span class="hub-email-label">To</span>
                                            <span class="hub-email-value">{action.preview.to}</span>
                                        </div>
                                        <div class="hub-email-row">
                                            <span class="hub-email-label">Subject</span>
                                            <span class="hub-email-value hub-email-subject">{action.preview.subject}</span>
                                        </div>
                                        <div class="hub-email-body-wrap">
                                            <span class="hub-email-label">Body</span>
                                            <div class="hub-email-body">{action.preview.body}</div>
                                        </div>
                                    </div>
                                </template>

                                <!-- Record update preview -->
                                <template lwc:elseif={action.preview.isRecord}>
                                    <div class="hub-record-preview">
                                        <div class="hub-record-row">
                                            <span class="hub-record-label">Object</span>
                                            <span class="hub-record-value">{action.preview.objectType}</span>
                                        </div>
                                        <div class="hub-record-row">
                                            <span class="hub-record-label">Record</span>
                                            <span class="hub-record-value">{action.preview.recordId}</span>
                                        </div>
                                        <template lwc:if={action.preview.hasRows}>
                                            <div class="hub-record-fields-heading">Fields to update</div>
                                            <ul class="hub-record-fields" role="list">
                                                <template for:each={action.preview.rows} for:item="row">
                                                    <li key={row.key} class="hub-record-field-row" role="listitem">
                                                        <span class="hub-record-field-name">{row.field}</span>
                                                        <span class="hub-record-field-value">{row.value}</span>
                                                    </li>
                                                </template>
                                            </ul>
                                        </template>
                                    </div>
                                </template>

                                <!-- External API call preview -->
                                <template lwc:elseif={action.preview.isApi}>
                                    <div class="hub-api-preview">
                                        <div class="hub-api-row">
                                            <c-pulse-badge label={action.preview.method} variant="purple"></c-pulse-badge>
                                            <span class="hub-api-endpoint">{action.preview.endpoint}</span>
                                        </div>
                                        <template lwc:if={action.preview.hasBody}>
                                            <div class="hub-api-body-heading">Request body</div>
                                            <pre class="hub-api-body">{action.preview.bodyPreview}</pre>
                                        </template>
                                    </div>
                                </template>

                                <!-- Generic fallback -->
                                <template lwc:else>
                                    <template lwc:if={action.preview.hasRows}>
                                        <ul class="hub-record-fields" role="list">
                                            <template for:each={action.preview.rows} for:item="row">
                                                <li key={row.key} class="hub-record-field-row" role="listitem">
                                                    <span class="hub-record-field-name">{row.field}</span>
                                                    <span class="hub-record-field-value">{row.value}</span>
                                                </li>
                                            </template>
                                        </ul>
                                    </template>
                                </template>
                                <div class="hub-action-meta">
                                    <template lwc:if={action.requestedByName}>
                                        <span class="hub-requester">Requested by {action.requestedByName}</span>
                                    </template>
                                </div>
                                <div class="hub-notes-row">
                                    <c-pulse-input label="Notes (optional)"
                                                   placeholder="Add notes…"
                                                   value={action.notes}
                                                   data-action-id={action.actionId}
                                                   onchange={handleNotesChange}></c-pulse-input>
                                </div>
                                <div class="hub-action-buttons">
                                    <c-pulse-button label="Approve"
                                                    variant="primary"
                                                    data-action-id={action.actionId}
                                                    disabled={action.isResolving}
                                                    onclick={handleApprove}></c-pulse-button>
                                    <c-pulse-button label="Reject"
                                                    variant="ghost"
                                                    data-action-id={action.actionId}
                                                    disabled={action.isResolving}
                                                    onclick={handleReject}></c-pulse-button>
                                </div>
                            </c-pulse-card>
                        </li>
                    </template>
                </ul>
            </template>
        </div>
    </template>
</template>
